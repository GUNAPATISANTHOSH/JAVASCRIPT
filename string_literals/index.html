<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Display</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body onload="display()">
    <div class="container d-flex align-items-center justify-content-center" style="height: 100vh;">
        <div class="card shadow-lg" style="width: 300px;">
            <div class="card-body text-center">
                <h5 class="card-title">Digital Clock</h5>
                <div id="time" style="font-size: 3rem; font-weight: bold; font-family: 'Courier New', monospace; color: #007bff;"></div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./2.js"></script>
</body>
</html>
