<html>
    <head>
        <script src="events.js"></script>
    </head>
    <body>
        <center>JAVASCRIPT events</center>
        <button style="font-size:20px; padding:15px 30px; background-color: red;" onmouseover="color1()" id="btn1">Mouse over</button><br><br>
        <button style="font-size:20px; padding:15px 30px; background-color: red;"onmouseout="color2()" id="btn2">Mouse out</button><br><br>
        <button style="font-size:20px; padding:15px 30px; background-color: red;" onclick="color3()" id="btn3">on click</button><br><br>
        <button style="font-size:20px; padding:15px 30px; background-color: red;" ondblclick="color4()" id="btn4">on double click</button><br><br>
        <input type="text" onfocus="color5()" id="btn5">
        <input type="text" onblur="color6()" class="input">
       
    </body>
</html>
